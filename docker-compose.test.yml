# Integration test harness — Odoo 19 CE + Postgres 16
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   pnpm -r test:integration
#   docker compose -f docker-compose.test.yml down -v

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: odoo_test
      POSTGRES_PASSWORD: odoo_test
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  odoo:
    image: odoo:19
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo_test
      PASSWORD: odoo_test
    ports:
      - "8069:8069"
    command: ["--without-demo=all"]
